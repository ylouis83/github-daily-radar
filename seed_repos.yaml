    - ai-boost/awesome-prompts
    - langchain-ai/langgraph/examples
    - crewAIInc/crewAI-examples
    - lobehub/lobe-chat-agents
  code_search_queries:
    - "filename:SKILL.md path:skills"
    - "filename:.cursorrules OR filename:cursorrules.md"
    - "filename:CLAUDE.md NOT repo:anthropics/claude-code"
    - "filename:AGENTS.md NOT repo:openai/openai-agents-python"
    - "filename:copilot-instructions.md"
    - "filename:mcp.json"
  repo_search_queries:
    - "cursor rules AI in:name,description"
    - "claude skills agent prompt in:name,description"
    - "mcp server tool in:name,description"
    - "agent workflow prompt in:name,description"

discussion_keywords:
  - proposal
  - rfc
  - design
  - roadmap
  - architecture

issue_pr_keywords:
  - proposal
  - rfc
  - design
  - feature request
  - roadmap

budget:
  total_search: 18
  graphql_budget: 600
  search_throttle_rpm: 25

ossinsight:
  enabled: true
  language: All
  trending_periods:
    - past_24_hours
    - past_7_days
  collection_period: past_28_days
  collection_name_keywords:
    - artificial intelligence
    - chatgpt
    - llm
    - machine learning
    - agent
    - rag
    - prompt
    - mcp
  max_trending_items: 20
  max_collection_ids: 3

output:
  daily_item_count:
    projects: 4-7
    skills: 3-5
    ideas_discussions: 3-6
  llm_max_candidates: 24
  cooldown_days: 14
  timezone: Asia/Shanghai
