name: daily-radar

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run without publishing or updating state"
        required: false
        default: false
        type: boolean
      report_limit:
        description: "Limit the number of report items for a manual run"
        required: false
        default: "0"
        type: string
      preview_card:
        description: "Send a mock preview card instead of the actual daily brief"
        required: false
        default: false
        type: boolean
      skip_radar:
        description: "Skip Daily Brief run"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: github-daily-radar
  cancel-in-progress: false

jobs:
  radar:
    if: ${{ inputs.preview_card || !inputs.skip_radar }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore state from state branch
        run: |
          if git show-ref --verify --quiet refs/remotes/origin/state; then
            echo "Restoring artifacts from state branch..."
            git checkout origin/state -- artifacts/ 2>/dev/null || echo "No artifacts in state branch yet"
          else
            echo "No state branch found, starting fresh."
          fi
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --extra dev
      - run: uv run python -m github_daily_radar.main
        if: ${{ !inputs.preview_card }}
        env:
          DRY_RUN: ${{ inputs.dry_run || false }}
          REPORT_LIMIT: ${{ inputs.report_limit || 0 }}
          TIMEZONE: Asia/Shanghai
          LLM_MODEL: qwen3.5-plus
          LLM_FALLBACK_MODEL: kimi-k2.5
          CODE_SEARCH_REQUESTS_PER_MINUTE: 4
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      - run: uv run python -m github_daily_radar.preview
        if: ${{ inputs.preview_card }}
        env:
          PREVIEW_DRY_RUN: ${{ inputs.dry_run || false }}
          TIMEZONE: Asia/Shanghai
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      - run: bash scripts/sync_state_branch.sh
        if: ${{ !inputs.dry_run && !inputs.preview_card }}
      - name: Send failure alert
        if: ${{ failure() && !inputs.preview_card }}
        run: uv run python -m github_daily_radar.main --alert-only
        env:
          LLM_MODEL: qwen3.5-plus
          LLM_FALLBACK_MODEL: kimi-k2.5
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-radar-artifacts
          path: artifacts/
